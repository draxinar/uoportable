name: uoportable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build dsound.dll
        run: make

      - name: Verify DLL
        run: file dsound.dll | grep -q 'PE32 executable.*DLL'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsound-dll
          path: dsound.dll

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dsound-dll

      - name: Package release
        run: zip uoportable.zip dsound.dll README.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: uoportable.zip
          generate_release_notes: true
